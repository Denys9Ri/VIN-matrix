name: Backend stability checks

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-checks.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-checks.yml'

jobs:
  django-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-test-secret-key-long-enough-for-hs256-signing-only
      DEBUG: 'False'
      USE_POSTGRES: 'False'
      ALLOWED_HOSTS: testserver,localhost
      BACKUP_DIR: /tmp/vin-matrix-backups
      APP_VERSION: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare static files directory
        run: mkdir -p staticfiles

      - name: Check Django configuration
        run: python manage.py check

      - name: Run stability and API tests
        run: python manage.py test apps.core.tests.test_api_smoke apps.core.tests.test_system_stability
