version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vin_matrix_db}
      POSTGRES_USER: ${DB_USER:-vin_matrix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${POSTGRES_BACKUP_DIR:-./backups}:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vin_matrix} -d ${DB_NAME:-vin_matrix_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn vin_matrix.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --access-logfile - --error-logfile -"
    env_file: .env
    environment:
      USE_POSTGRES: 'True'
      DB_HOST: db
      DB_PORT: 5432
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - ${POSTGRES_BACKUP_DIR:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  static_data:
  media_data:
