<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VIN-matrix — CRM і система управління для СТО, шиномонтажу та магазину автозапчастин: візити, клієнти, склад, закупки, документи, оплати, Нова пошта та аналітика." />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="theme-color" content="#0d1931" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="uk_UA" />
    <meta property="og:site_name" content="VIN-matrix" />
    <meta property="og:title" content="VIN-matrix — CRM для СТО, шиномонтажу та автозапчастин" />
    <meta property="og:description" content="Візити, клієнти, склад, закупки, документи, оплати, Нова пошта та аналітика в одному робочому просторі." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VIN-matrix — CRM для автобізнесу" />
    <meta name="twitter:description" content="Система управління для СТО, шиномонтажу та магазину автозапчастин." />
    <title>VIN-matrix — CRM для СТО, шиномонтажу та автозапчастин</title>
    <script>
      (() => {
        const origin = 'https://vin-matrix.com';
        const path = window.location.pathname === '/landing' ? '/' : window.location.pathname;
        const privatePrefixes = ['/login', '/register', '/onboarding', '/settings', '/billing', '/sales-leads', '/search', '/inventory', '/visits', '/attention', '/clients', '/analytics', '/activity', '/journal', '/data', '/partner-clients', '/partners', '/complexes', '/crm'];
        const isPrivate = privatePrefixes.some((prefix) => path === prefix || path.startsWith(`${prefix}/`));
        const robots = document.querySelector('meta[name="robots"]');

        if (isPrivate) {
          robots?.setAttribute('content', 'noindex,nofollow,noarchive');
          return;
        }

        const canonical = document.createElement('link');
        canonical.rel = 'canonical';
        canonical.href = `${origin}${path === '/' ? '/' : path}`;
        document.head.appendChild(canonical);
      })();
    </script>
    <style>
      .bm-parts-badge {
        background: linear-gradient(90deg, #d71920 0 34%, #e5e7eb 34% 52%, #ffffff 52% 100%) !important;
        color: #0f172a !important;
        border: 1px solid #cbd5e1 !important;
        box-shadow: 0 4px 6px -1px rgba(148, 163, 184, 0.28), 0 2px 4px -2px rgba(148, 163, 184, 0.28) !important;
      }
      .bm-parts-badge svg { color: #0f172a !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const isBmBadgeText = (text) => {
          const value = String(text || '').toUpperCase();
          return value.includes('BM-PARTS') || value.includes('BM PARTS') || value.includes('BM‑PARTS');
        };
        const applyBmBadgeStyle = () => {
          document.querySelectorAll('span, div').forEach((el) => {
            if (!isBmBadgeText(el.textContent)) return;
            const className = String(el.className || '');
            const looksLikeBadge = className.includes('rounded-lg') || className.includes('rounded-bl-xl') || className.includes('tracking-widest');
            if (looksLikeBadge) el.classList.add('bm-parts-badge');
          });
        };
        const observer = new MutationObserver(() => window.requestAnimationFrame(applyBmBadgeStyle));
        window.addEventListener('DOMContentLoaded', () => {
          applyBmBadgeStyle();
          const root = document.getElementById('root');
          if (root) observer.observe(root, { childList: true, subtree: true, characterData: true });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
