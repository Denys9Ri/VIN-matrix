server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # МАГІЯ ДЛЯ REACT ROUTER:
        # Спочатку шукаємо файл ($uri), потім папку ($uri/), 
        # якщо нічого немає - віддаємо index.html
        try_files $uri $uri/ /index.html;
    }

    # Кешування статичних файлів (картинки, JS, CSS) для швидкості
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
