server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # The public product homepage has one canonical URL.
    location = /landing {
        return 301 /$is_args$args;
    }

    location = /landing/ {
        return 301 /$is_args$args;
    }

    # Application screens are for signed-in users and must not appear in search.
    location ~ ^/(login|register|onboarding|settings|billing|sales-leads|search|inventory|visits|attention|clients|analytics|activity|journal|data|partner-clients|partners|complexes|crm)(/|$) {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|avif|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
