server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;
    error_page 404 /404.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # The public product homepage has one canonical URL.
    location = /landing {
        return 301 /$is_args$args;
    }

    location = /landing/ {
        return 301 /$is_args$args;
    }

    location = /404.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Application screens are for signed-in users and must not appear in search.
    location ~ ^/(app|login|register|onboarding|settings|billing|sales-leads|search|inventory|visits|attention|clients|analytics|activity|journal|data|partner-clients|partners|complexes|crm)(/|$) {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri/ /index.html;
    }

    # Public static pages are pre-rendered during the build. Unknown URLs get a true HTTP 404.
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|avif|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
        try_files $uri =404;
    }
}
