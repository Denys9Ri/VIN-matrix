<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="theme-color" content="#0d1931" />
    <title>Сторінку не знайдено — VIN-matrix</title>
    <style>
      :root{color-scheme:dark;font-family:Inter,Arial,sans-serif;background:#0d1931;color:#f8fbff}
      *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 18% 15%,#1f5cc955,transparent 32%),radial-gradient(circle at 84% 82%,#0cb7c655,transparent 30%),#0d1931}
      main{width:min(100%,720px);padding:clamp(32px,7vw,70px);border:1px solid #ffffff20;border-radius:32px;background:#122346cc;box-shadow:0 30px 90px #02081980;text-align:center;backdrop-filter:blur(12px)}
      .mark{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 24px;border-radius:18px;background:linear-gradient(145deg,#3e7cff,#1957df);box-shadow:0 14px 30px #1553cb80;font-size:24px;font-weight:900}.brand{font-size:20px;font-weight:900;letter-spacing:-.05em}.brand b{color:#4d83ff}.code{margin:34px 0 10px;font-size:clamp(72px,16vw,132px);font-weight:900;line-height:.9;letter-spacing:-.09em;background:linear-gradient(110deg,#ffffff,#77a4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
      h1{margin:0;font-size:clamp(28px,5vw,42px);letter-spacing:-.055em}p{max-width:510px;margin:18px auto 0;color:#b8c9e9;font-size:16px;line-height:1.6}.actions{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin-top:32px}a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border:1px solid #ffffff25;border-radius:14px;color:#f8fbff;text-decoration:none;font-weight:800;transition:.18s ease}a.primary{border-color:#3a72f4;background:#2d67e8;box-shadow:0 10px 25px #1c57d680}a:hover{transform:translateY(-1px);background:#ffffff13}a.primary:hover{background:#3b73ef}.hint{margin-top:24px;color:#8399c1;font-size:12px}
    </style>
  </head>
  <body>
    <main>
      <div class="mark">×</div>
      <div class="brand">VIN-<b>matrix</b></div>
      <div class="code">404</div>
      <h1>Такої сторінки немає</h1>
      <p>Можливо, посилання застаріло або адреса введена з помилкою. Повернись на головну сторінку або перейди до входу в систему.</p>
      <div class="actions">
        <a class="primary" href="/">На головну</a>
        <a href="/login">Увійти в VIN-matrix</a>
      </div>
      <div class="hint">VIN-matrix · система управління автобізнесом</div>
    </main>
  </body>
</html>
